services:
  exfil:
    build:
      context: ../../_shared/exfil_listener
    container_name: asi02-defense-exfil
    ports:
      - "8888:8888"

  agent:
    build:
      context: ../..
      dockerfile: asi02-tool-misuse/defense/Dockerfile
    container_name: asi02-defense-agent
    depends_on:
      - exfil
    environment:
      OLLAMA_HOST: "http://host.docker.internal:11434"
      ASI_MODEL: "qwen2.5:3b-instruct"
      EXFIL_URL: "http://exfil:8888/collect"
    extra_hosts:
      - "host.docker.internal:host-gateway"
